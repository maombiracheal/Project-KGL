<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karibu Groceries | Login</title>
  <link rel="stylesheet" href="/login.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/login.js" defer></script>
</head>
<body>

  <div class="container">

    <div class="left">
      <div class="branding">
        <div class="logo">
           <img src="/Frontend/images/kgl.log-Photoroom.png" width="200" height="150" alt="logo">
        </div>

        <h1>Karibu Groceries LTD</h1>
        <p>Wholesale Produce Distribution Management System</p>

        <div class="stats">
          <div class="stat-box">
            <i data-lucide="building-2"></i>
            <h2>2</h2>
            <p>Branches</p>
          </div>
          <div class="stat-box">
            <i data-lucide="package"></i>
            <h2>5</h2>
            <p>Products</p>
          </div>
          <div class="stat-box">
            <i data-lucide="clock"></i>
            <h2>24/7</h2>
            <p>Operations</p>
          </div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="login-box">
        <h2>Sign In</h2>
        <p class="subtitle">Enter your credentials to access your account</p>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <form id="loginForm" method="post">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username (e.g. manager.maganjo, maganjo, or director)" required>

          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" placeholder=".........." required>
            <button type="button" id="togglePasswordBtn" class="password-toggle" aria-label="Show password">
              <i data-lucide="eye"></i>
            </button>
          </div>
        
          <button type="submit" id="loginBtn">Sign In</button>
           <div class="form-meta">
            <a href="#" id="forgotPasswordLink">Forgot password?</a>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    if (window.lucide && typeof window.lucide.createIcons === 'function') {
      window.lucide.createIcons();
    }
  </script>

</body>
</html>
